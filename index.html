<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>BwithMe — Secure Verification Hub</title>
    <style>
        :root {
            --bg-global: #0b071e;
            --bg-container: #0f0a28;
            --bg-card: #16103c;
            --border-color: #241b56;
            --text-main: #ffffff;
            --text-muted: #8e89b3;
            --color-primary: #d946ef;
            --gradient-accent: linear-gradient(135deg, #a855f7, #ec4899);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-global);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .phone-wrapper {
            background-color: var(--bg-container);
            width: 100%;
            max-width: 410px;
            height: 720px;
            border-radius: 42px;
            border: 10px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 30px;
            justify-content: center;
        }

        .title-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .title-area h1 {
            font-size: 26px;
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .input-field {
            width: 100%;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 14px;
            border-radius: 14px;
            font-size: 15px;
            outline: none;
        }
        
        .uppercase-field {
            text-transform: uppercase;
        }

        .action-btn {
            background: var(--gradient-accent);
            color: #ffffff;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .alert-box {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 14px;
            border-radius: 12px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }

        .key-display-box {
            background: linear-gradient(180deg, var(--bg-card), rgba(217, 70, 239, 0.05));
            border: 2px dashed var(--color-primary);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            margin-top: 25px;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .generated-key {
            font-family: 'Courier New', Courier, monospace;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 1px;
            margin: 15px 0;
            background: #000;
            padding: 10px;
            border-radius: 8px;
            word-break: break-all;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

        <div class="alert-box" id="statusMessage"></div>

        <div id="formContainer">

            </div>
            <div class="input-group">

            <div class="input-group">

            <button class="action-btn" onclick="claimMyKey()">Verify Identity & Generate →</button>
        </div>

            <button class="action-btn" style="background: var(--bg-card); border: 1px solid var(--border-color);" onclick="copyKey()">Copy Key to Clipboard</button>

    </div>

        function claimMyKey() {
            const firstName = document.getElementById('firstNameInput').value.trim().toUpperCase();
            const lastName = document.getElementById('lastNameInput').value.trim().toUpperCase();
            const enteredPin = document.getElementById('pinInput').value.trim();
            const msgBox = document.getElementById('statusMessage');
            
            if(!firstName || !lastName || !enteredPin) {
                showError("Please fill out all credential blocks.");
                return;
            }

            const searchString = `${firstName} ${lastName}`;
            
            // Checks browser local storage to enforce a one-time retrieval trick
            if(localStorage.getItem(`claimed_${searchString}`)) {
                showError("SECURITY ALERT: Identity key has already been issued once and locked.");
                return;
            }

            // Verify if the name exists in your records
            if(registry[searchString]) {
                // Verify if the custom assigned pin matches perfectly

                    msgBox.style.display = "none";
                    document.getElementById('formContainer').style.display = "none";
                    
                    // Reveal user token
                    document.getElementById('keyOutput').innerText = registry[searchString].username;
                    document.getElementById('keyDisplayBox').style.display = "block";
                    
                    // Trigger the permanent lock
                    localStorage.setItem(`claimed_${searchString}`, "true");
                } else {
                    showError("Security Error: Invalid authentication PIN code.");
                }
            } else {
                showError("Identity profile not found. Verify matching spelling.");
            }
        }

        function showError(message) {
            const msgBox = document.getElementById('statusMessage');
            msgBox.style.backgroundColor = "rgba(239, 68, 68, 0.1)";
            msgBox.style.borderColor = "#ef4444";
            msgBox.style.color = "#ef4444";
            msgBox.innerText = message;
            msgBox.style.display = "block";
        }

        function copyKey() {
            const keyText = document.getElementById('keyOutput').innerText;
            navigator.clipboard.writeText(keyText);
            alert("Key copied safely! Paste this into the main app login screen.");
